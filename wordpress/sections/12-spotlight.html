<!-- ============================================================
     KURNIA SEAFOOD · SPOTLIGHT TERBARU (promo/menu/campaign)
     Menampilkan 1 item active dgn date terbaru dari window.KS_PROMOS.
     Auto-hide bila tidak ada item aktif. Foto = placeholder bertanda.
     PRASYARAT: data/promos.js dimuat sebelum section ini.
     ============================================================ -->
<section class="ks-spot" id="spotlight" hidden>
  <div class="ks-spot__inner">
    <figure class="ks-spot__media">
      <!-- TODO: ganti dengan foto resmi Kurnia (hak cipta) -->
      <img alt="" loading="lazy" onerror="this.style.display='none'">
      <span class="ks-spot__type"></span>
    </figure>
    <div class="ks-spot__body">
      <span class="ks-kicker">Terbaru</span>
      <h2 class="ks-spot__title"></h2>
      <p class="ks-spot__desc"></p>
      <a class="ks-spot__cta ks-btn ks-btn--red" href="#"></a>
    </div>
  </div>

  <style>
  .ks-spot{
    --navy:#14263D; --red:#D80000; --red-2:#B40000; --blue:#0056AC; --muted:#5d6b7a; --soft:#E7F0FB;
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    background:var(--soft); font-family:var(--fh); padding:clamp(48px,7vw,86px) 22px;
  }
  .ks-spot__inner{ max-width:1140px; margin:0 auto; display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(24px,4vw,52px); align-items:center; }
  .ks-spot__media{ position:relative; margin:0; aspect-ratio:16/10; border-radius:22px; overflow:hidden;
    background:linear-gradient(135deg,#0056AC,#5a9be0); box-shadow:0 30px 60px -30px rgba(0,86,172,.5); }
  .ks-spot__media img{ width:100%; height:100%; object-fit:cover; }
  .ks-spot__type{ position:absolute; top:14px; left:14px; font-family:var(--fl); font-weight:700; font-size:11px;
    letter-spacing:.14em; text-transform:uppercase; color:#fff; background:var(--red); padding:6px 14px; border-radius:999px; box-shadow:0 8px 16px -8px rgba(216,0,0,.7); }
  .ks-kicker{ font-family:var(--fl); font-weight:700; font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }
  .ks-spot__title{ font-family:var(--fh); font-weight:600; color:var(--navy); font-size:clamp(1.9rem,4.2vw,3rem); line-height:1.08; margin:12px 0 0; letter-spacing:-.01em; }
  .ks-spot__desc{ font-family:var(--fh); font-size:1.12rem; line-height:1.6; color:#3a4757; margin:14px 0 0; max-width:46ch; }
  .ks-btn{ font-family:var(--fl); font-weight:600; font-size:13px; letter-spacing:.1em; text-transform:uppercase; text-decoration:none; display:inline-flex; padding:14px 28px; border-radius:10px; border:2px solid transparent; transition:background .2s,transform .18s; margin-top:24px; }
  .ks-btn--red{ background:var(--red); color:#fff; box-shadow:0 16px 30px -14px rgba(216,0,0,.5); }
  .ks-btn--red:hover{ background:var(--red-2); transform:translateY(-2px); }
  @media (max-width:820px){ .ks-spot__inner{ grid-template-columns:1fr; } .ks-spot__media{ order:-1; } }
  @media (prefers-reduced-motion: reduce){ .ks-btn--red:hover{ transform:none; } }
  </style>

  <script>
  (function () {
    var root = document.getElementById('spotlight');
    var items = (window.KS_PROMOS || []).filter(function (p) { return p.active; });
    if (!items.length) { root.remove(); return; }   // auto-hide bila kosong
    items.sort(function (a, b) { return String(b.date || '').localeCompare(String(a.date || '')); });
    var it = items[0];

    var img = root.querySelector('.ks-spot__media img');
    img.src = it.image || '';
    img.alt = it.title || 'Spotlight';
    if (it.placeholder) img.setAttribute('data-placeholder', 'true');
    root.querySelector('.ks-spot__type').textContent = (it.type || 'promo');
    root.querySelector('.ks-spot__title').textContent = it.title || '';
    root.querySelector('.ks-spot__desc').textContent = it.desc || '';
    var cta = root.querySelector('.ks-spot__cta');
    cta.textContent = it.ctaLabel || 'Lihat Detail';
    cta.href = it.ctaHref || '#';
    root.hidden = false;
  })();
  </script>
</section>
