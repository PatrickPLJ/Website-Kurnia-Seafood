<!-- ============================================================
     KURNIA SEAFOOD · SECTION KABAR & PROMO  (3 kartu putih)
     Gaya Bamzi "Restaurant blog & update".
     ============================================================ -->
<section class="ks-news">
  <div class="ks-news__inner">
    <header class="ks-news__head">
      <span class="ks-kicker ks-kicker--center">
        <svg viewBox="0 0 24 24"><path d="M3 13c4-5 14-5 18 0M6 11c2 3 10 3 12 0M16 11l3-2-1 3"/><circle cx="9" cy="9.5" r=".9"/></svg>
        Kabar &amp; Promo
      </span>
      <h2 class="ks-news__title">Kabar &amp; promo terbaru</h2>
    </header>

    <div class="ks-news__grid">
      <article class="ks-post">
        <div class="ks-post__media">
          <img src="https://images.unsplash.com/photo-1559737558-2f5a35f4523b?auto=format&fit=crop&w=700&q=72" alt="Promo paket keluarga" loading="lazy" onerror="this.style.display='none'">
        </div>
        <span class="ks-post__date">5 Juni 2026</span>
        <h3>Paket Keluarga Hemat untuk 4 orang</h3>
        <a href="#" class="ks-post__more">Selengkapnya</a>
      </article>

      <article class="ks-post">
        <div class="ks-post__media">
          <img src="https://images.unsplash.com/photo-1606756790138-261d2b21cd75?auto=format&fit=crop&w=700&q=72" alt="Menu spesial kepiting" loading="lazy" onerror="this.style.display='none'">
        </div>
        <span class="ks-post__date">1 Juni 2026</span>
        <h3>Spesial bulan ini: Kepiting Cabai Garam</h3>
        <a href="#" class="ks-post__more">Selengkapnya</a>
      </article>

      <article class="ks-post">
        <div class="ks-post__media">
          <img src="https://images.unsplash.com/photo-1535140728325-a4d3707eee61?auto=format&fit=crop&w=700&q=72" alt="Tips memilih ikan segar" loading="lazy" onerror="this.style.display='none'">
        </div>
        <span class="ks-post__date">24 Mei 2026</span>
        <h3>Cara kami menjaga kesegaran tangkapan</h3>
        <a href="#" class="ks-post__more">Selengkapnya</a>
      </article>
    </div>
  </div>

  <style>
  .ks-news{
    --navy:#14263D; --red:#D80000; --blue:#0056AC; --muted:#7c8896; --line:#e8eaee;
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    background:#fff; font-family:var(--fh); padding:clamp(54px,8vw,96px) 22px;
  }
  .ks-news__inner{ max-width:1140px; margin:0 auto; }
  .ks-news__head{ text-align:center; margin-bottom:48px; }
  .ks-kicker{ display:inline-flex; align-items:center; gap:9px; font-family:var(--fl); font-weight:600;
    font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }
  .ks-kicker--center{ justify-content:center; }
  .ks-kicker svg{ width:20px; height:20px; fill:none; stroke:var(--red); stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round; }
  .ks-news__title{ font-family:var(--fh); font-weight:600; color:var(--navy);
    font-size:clamp(2rem,4.4vw,3.1rem); margin:12px 0 0; letter-spacing:-.01em; }

  .ks-news__grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:30px; }
  .ks-post__media{ aspect-ratio:16/11; border-radius:16px; overflow:hidden; margin-bottom:18px;
    background:linear-gradient(135deg,#0056AC,#5a9be0); }
  .ks-post__media img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
  .ks-post:hover .ks-post__media img{ transform:scale(1.05); }
  .ks-post__date{ font-family:var(--fl); font-weight:600; font-size:11.5px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--red); display:block;
    border-top:1px solid var(--line); padding-top:16px; }
  .ks-post h3{ font-family:var(--fh); font-weight:600; font-size:1.3rem; color:var(--navy);
    line-height:1.25; margin:10px 0 16px; }
  .ks-post__more{ font-family:var(--fl); font-weight:600; font-size:11.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--navy); text-decoration:none; border-bottom:2px solid var(--red);
    padding-bottom:3px; transition:color .2s; }
  .ks-post__more:hover{ color:var(--red); }

  @media (max-width:820px){ .ks-news__grid{ grid-template-columns:1fr; max-width:440px; margin:0 auto; } }
  @media (prefers-reduced-motion: reduce){ .ks-post:hover .ks-post__media img{ transform:none; } }
  </style>
</section>
