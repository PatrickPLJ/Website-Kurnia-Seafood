<!-- ============================================================
     KURNIA SEAFOOD · SECTION GALERI  (grid foto premium)
     Gaya Bamzi. Tempel di widget "HTML". Ganti foto (src) & caption.
     ============================================================ -->
<section class="ks-gal" id="galeri">
  <div class="ks-gal__inner">
    <header class="ks-gal__head">
      <span class="ks-kicker ks-kicker--center">
        <svg viewBox="0 0 24 24"><path d="M3 13c4-5 14-5 18 0M6 11c2 3 10 3 12 0M16 11l3-2-1 3"/><circle cx="9" cy="9.5" r=".9"/></svg>
        Galeri
      </span>
      <h2 class="ks-gal__title">Momen di Kurnia Seafood</h2>
      <p class="ks-gal__sub">Sekilas suasana, hidangan, dan kebersamaan di tempat kami.</p>
    </header>

    <div class="ks-gal__grid">
      <figure class="ks-gtile ks-gtile--big">
        <img src="https://images.unsplash.com/photo-1559737558-2f5a35f4523b?auto=format&fit=crop&w=1000&q=72" alt="Sajian seafood spesial" loading="lazy" onerror="this.style.display='none'">
        <figcaption>Sajian Spesial</figcaption>
      </figure>
      <figure class="ks-gtile">
        <img src="https://images.unsplash.com/photo-1606756790138-261d2b21cd75?auto=format&fit=crop&w=700&q=72" alt="Kepiting saus padang" loading="lazy" onerror="this.style.display='none'">
        <figcaption>Kepiting Saus Padang</figcaption>
      </figure>
      <figure class="ks-gtile">
        <img src="https://images.unsplash.com/photo-1535140728325-a4d3707eee61?auto=format&fit=crop&w=700&q=72" alt="Ikan bakar" loading="lazy" onerror="this.style.display='none'">
        <figcaption>Ikan Bakar</figcaption>
      </figure>
      <figure class="ks-gtile">
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=700&q=72" alt="Suasana ruang makan" loading="lazy" onerror="this.style.display='none'">
        <figcaption>Suasana Ruang Makan</figcaption>
      </figure>
      <figure class="ks-gtile ks-gtile--wide">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=1000&q=72" alt="Hidangan laut di meja" loading="lazy" onerror="this.style.display='none'">
        <figcaption>Meja Penuh Kebahagiaan</figcaption>
      </figure>
    </div>
  </div>

  <style>
  .ks-gal{
    --navy:#14263D; --red:#D80000; --muted:#7c8896;
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    background:#fff; font-family:var(--fh); padding:clamp(54px,8vw,96px) 22px;
  }
  .ks-gal__inner{ max-width:1140px; margin:0 auto; }
  .ks-gal__head{ text-align:center; margin-bottom:44px; }
  .ks-kicker{ display:inline-flex; align-items:center; gap:9px; font-family:var(--fl); font-weight:600;
    font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }
  .ks-kicker--center{ justify-content:center; }
  .ks-kicker svg{ width:20px; height:20px; fill:none; stroke:var(--red); stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round; }
  .ks-gal__title{ font-family:var(--fh); font-weight:600; color:var(--navy);
    font-size:clamp(2rem,4.4vw,3.1rem); margin:12px 0 0; letter-spacing:-.01em; }
  .ks-gal__sub{ font-family:var(--fl); font-weight:300; color:var(--muted); margin:12px 0 0; }

  .ks-gal__grid{ display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:200px; gap:16px; }
  .ks-gtile{ position:relative; margin:0; overflow:hidden; border-radius:16px;
    background:linear-gradient(135deg,#0056AC,#5a9be0); }
  .ks-gtile--big{ grid-column:span 2; grid-row:span 2; }
  .ks-gtile--wide{ grid-column:span 2; }
  .ks-gtile img{ width:100%; height:100%; object-fit:cover; transition:transform .5s ease; }
  .ks-gtile:hover img{ transform:scale(1.07); }
  .ks-gtile::after{ content:""; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(4,34,63,.78), transparent 55%); opacity:0; transition:opacity .3s; }
  .ks-gtile:hover::after{ opacity:1; }
  .ks-gtile figcaption{ position:absolute; left:16px; bottom:14px; z-index:1; color:#F6F1E7;
    font-family:var(--fl); font-weight:500; font-size:13px; letter-spacing:.06em;
    opacity:0; transform:translateY(8px); transition:opacity .3s, transform .3s; }
  .ks-gtile:hover figcaption{ opacity:1; transform:none; }

  @media (max-width:820px){
    .ks-gal__grid{ grid-template-columns:repeat(2,1fr); grid-auto-rows:160px; }
    .ks-gtile--big{ grid-column:span 2; grid-row:span 1; }
    .ks-gtile--wide{ grid-column:span 2; }
  }
  @media (prefers-reduced-motion: reduce){ .ks-gtile:hover img{ transform:none; } }
  </style>
</section>
