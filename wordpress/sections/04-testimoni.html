<!-- ============================================================
     KURNIA SEAFOOD · SECTION TESTIMONI
     Tempel di Elementor: widget "HTML". Ganti kutipan & nama.
     ============================================================ -->
<section class="ks-tm">
  <div class="ks-tm__inner">
    <header class="ks-tm__head">
      <span class="ks-kicker">Kata Pelanggan</span>
      <h2 class="ks-tm__title">Ribuan keluarga sudah <span class="ks-hl">bahagia</span> di sini</h2>
      <div class="ks-tm__rating">
        <span class="ks-stars">★★★★★</span>
        <strong>4.9 / 5</strong> · 1.200+ ulasan
      </div>
    </header>

    <div class="ks-tm__grid">
      <figure class="ks-quote">
        <span class="ks-stars">★★★★★</span>
        <blockquote>“Kepitingnya juara! Bumbunya meresap, porsinya banyak. Tempatnya juga nyaman buat bawa anak-anak.”</blockquote>
        <figcaption><span class="ks-av">RA</span><div><strong>Rina A.</strong><small>Jakarta</small></div></figcaption>
      </figure>

      <figure class="ks-quote">
        <span class="ks-stars">★★★★★</span>
        <blockquote>“Langganan tiap akhir pekan. Seafoodnya selalu segar dan harganya masuk akal. Recommended banget!”</blockquote>
        <figcaption><span class="ks-av ks-av--red">BS</span><div><strong>Budi S.</strong><small>Tangerang</small></div></figcaption>
      </figure>

      <figure class="ks-quote">
        <span class="ks-stars">★★★★★</span>
        <blockquote>“Pelayanannya ramah, makanannya cepat datang. Udang bakar madunya bikin nagih. The happiest seafood time!”</blockquote>
        <figcaption><span class="ks-av">DK</span><div><strong>Dewi K.</strong><small>Bekasi</small></div></figcaption>
      </figure>
    </div>
  </div>

  <style>
  .ks-tm{
    --blue:#0056AC; --red:#D80000; --ink:#14263D; --grey:#929497; --soft:#E7F0FB;
    --fh:'Alexandria',system-ui,sans-serif; --fb:'Crimson Pro',Georgia,serif;
    background:var(--soft); font-family:var(--fb); padding:clamp(48px,7vw,86px) 20px;
  }
  .ks-tm__inner{ max-width:1140px; margin:0 auto; }
  .ks-tm__head{ text-align:center; margin-bottom:44px; }
  .ks-kicker{ font-family:var(--fh); font-weight:700; font-size:13px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--red); }
  .ks-tm__title{ font-family:var(--fh); font-weight:800; color:var(--ink);
    font-size:clamp(1.8rem,4vw,2.7rem); margin:12px 0 0; letter-spacing:-.02em; }
  .ks-hl{ position:relative; color:var(--blue); }
  .ks-hl::after{ content:""; position:absolute; left:-2%; right:-2%; bottom:.06em; height:.32em;
    background:rgba(0,86,172,.16); border-radius:6px; z-index:0; }
  .ks-tm__rating{ margin-top:16px; font-size:1.05rem; color:#3c4a5c; }
  .ks-tm__rating strong{ font-family:var(--fh); color:var(--ink); }
  .ks-stars{ color:#F5A623; letter-spacing:2px; }

  .ks-tm__grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  .ks-quote{ background:#fff; border-radius:22px; padding:28px 26px; margin:0;
    box-shadow:0 16px 34px -22px rgba(0,86,172,.4); border:1px solid #fff; }
  .ks-quote blockquote{ margin:14px 0 0; font-size:1.12rem; line-height:1.62; color:#2c3a4d; font-style:italic; }
  .ks-quote figcaption{ display:flex; align-items:center; gap:12px; margin-top:20px; }
  .ks-av{ width:44px; height:44px; border-radius:50%; background:var(--blue); color:#fff;
    display:grid; place-items:center; font-family:var(--fh); font-weight:700; font-size:15px; }
  .ks-av--red{ background:var(--red); }
  .ks-quote figcaption strong{ display:block; font-family:var(--fh); color:var(--ink); font-size:1rem; }
  .ks-quote figcaption small{ color:var(--grey); }

  @media (max-width:900px){ .ks-tm__grid{ grid-template-columns:1fr; max-width:560px; margin:0 auto; } }
  </style>
</section>
