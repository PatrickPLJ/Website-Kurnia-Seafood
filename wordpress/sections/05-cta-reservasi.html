<!-- ============================================================
     KURNIA SEAFOOD · SECTION CTA / RESERVASI
     Tempel di Elementor: widget "HTML".
     Ganti nomor WhatsApp, alamat, jam buka, dan link tombol.
     ============================================================ -->
<section class="ks-cta" id="reservasi">
  <svg class="ks-cta__wave" viewBox="0 0 1440 90" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0 40 C 240 0 480 80 720 50 C 960 20 1200 70 1440 40 L1440 0 L0 0 Z"></path>
  </svg>

  <div class="ks-cta__inner">
    <div class="ks-cta__copy">
      <span class="ks-kicker">Lagi lapar? 🦞</span>
      <h2 class="ks-cta__title">Yuk, makan seafood<br>paling bahagia hari ini!</h2>
      <p class="ks-cta__sub">Reservasi sekarang atau langsung mampir. Kami tunggu kedatanganmu!</p>

      <div class="ks-cta__btns">
        <a href="https://wa.me/62000000000" class="ks-btn ks-btn--wa">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20l1.5-4.5A8 8 0 1 1 9 19L4 20Z"/><path d="M9 10c0 4 2 6 6 6"/></svg>
          Reservasi via WhatsApp
        </a>
        <a href="tel:+62000000000" class="ks-btn ks-btn--white">Telepon Kami</a>
      </div>
    </div>

    <div class="ks-cta__info">
      <div class="ks-info">
        <span class="ks-info__ic">📍</span>
        <div><strong>Lokasi</strong><p>Jl. Contoh Alamat No. 8, Kota Anda</p></div>
      </div>
      <div class="ks-info">
        <span class="ks-info__ic">🕒</span>
        <div><strong>Jam Buka</strong><p>Setiap hari · 10.00 – 22.00 WIB</p></div>
      </div>
      <div class="ks-info">
        <span class="ks-info__ic">📞</span>
        <div><strong>Kontak</strong><p>+62 000-0000-0000</p></div>
      </div>
    </div>
  </div>

  <style>
  .ks-cta{
    --blue:#0056AC; --blue-dark:#023E7D; --red:#D80000; --wa:#25D366; --ink:#14263D;
    --fh:'Alexandria',system-ui,sans-serif; --fb:'Crimson Pro',Georgia,serif;
    position:relative; background:linear-gradient(135deg,#0056AC,#023E7D); color:#fff;
    font-family:var(--fb); padding:clamp(70px,9vw,110px) 20px clamp(48px,7vw,80px); overflow:hidden;
  }
  .ks-cta__wave{ position:absolute; top:-1px; left:0; width:100%; height:80px; }
  .ks-cta__wave path{ fill:#fff; }       /* sesuaikan dgn warna section di atasnya */
  .ks-cta::after{ content:""; position:absolute; inset:0; opacity:.18; pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.5) 2px, transparent 2.5px); background-size:32px 32px; }
  .ks-cta__inner{ position:relative; max-width:1140px; margin:0 auto; display:grid;
    grid-template-columns:1.1fr .9fr; gap:clamp(28px,5vw,64px); align-items:center; }
  .ks-kicker{ font-family:var(--fh); font-weight:700; font-size:14px; letter-spacing:.14em;
    text-transform:uppercase; color:#FFD7D7; }
  .ks-cta__title{ font-family:var(--fh); font-weight:800; font-size:clamp(1.9rem,4.4vw,3.1rem);
    line-height:1.08; margin:12px 0 0; color:#fff; letter-spacing:-.02em; }
  .ks-cta__sub{ margin:16px 0 0; font-size:1.15rem; color:rgba(255,255,255,.85); max-width:42ch; }
  .ks-cta__btns{ display:flex; flex-wrap:wrap; gap:14px; margin-top:28px; }
  .ks-btn{ font-family:var(--fh); font-weight:700; font-size:15.5px; text-decoration:none;
    display:inline-flex; align-items:center; gap:10px; padding:15px 28px; border-radius:999px;
    border:2px solid transparent; transition:transform .18s, box-shadow .25s, background .2s, color .2s; }
  .ks-btn svg{ width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .ks-btn--wa{ background:var(--wa); color:#063; box-shadow:0 16px 30px -14px rgba(37,211,102,.7); }
  .ks-btn--wa:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .ks-btn--white{ background:#fff; color:var(--blue); }
  .ks-btn--white:hover{ transform:translateY(-2px); background:#FFE5E5; color:var(--red); }

  .ks-cta__info{ display:grid; gap:14px; background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.18); border-radius:24px; padding:24px; backdrop-filter:blur(6px); }
  .ks-info{ display:flex; gap:14px; align-items:flex-start; }
  .ks-info__ic{ font-size:22px; line-height:1; flex:none; width:44px; height:44px; border-radius:14px;
    background:rgba(255,255,255,.15); display:grid; place-items:center; }
  .ks-info strong{ font-family:var(--fh); font-weight:700; color:#fff; display:block; }
  .ks-info p{ margin:3px 0 0; color:rgba(255,255,255,.8); font-size:1rem; }

  @media (max-width:860px){ .ks-cta__inner{ grid-template-columns:1fr; } .ks-cta__btns{ }
    .ks-cta__title{ } }
  @media (prefers-reduced-motion: reduce){ .ks-btn:hover{ transform:none; } }
  </style>
</section>
