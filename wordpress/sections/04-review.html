<!-- ============================================================
     KURNIA SEAFOOD · SECTION KATA PELANGGAN ("Wall of Love")
     Adaptasi layout grid testimonial (shadcn "Wall of Love") ke vanilla
     HTML/CSS bergaya brand. Dirender dari window.KS_TESTIMONIALS.
     PRASYARAT: pasang data/testimonials.js SEKALI sebelum section ini.
     Avatar = placeholder pihak ketiga → lihat PLACEHOLDERS.md.
     ============================================================ -->
<section class="ks-wol" id="review">
  <div class="ks-wol__inner">
    <header class="ks-wol__head">
      <span class="ks-kicker">
        <svg viewBox="0 0 24 24"><path d="M12 17.3 6.2 21l1.6-6.6L3 9.8l6.7-.5L12 3l2.3 6.3 6.7.5-4.8 4.6L17.8 21z"/></svg>
        Kata Pelanggan
      </span>
      <h2 class="ks-wol__title">Dicintai keluarga di lima kota</h2>
      <p class="ks-wol__rating">
        <span class="ks-wol__stars" aria-hidden="true">★★★★★</span>
        <strong>4.9</strong> dari <strong>26.586</strong> ulasan · Google &amp; GoFood
      </p>
    </header>

    <div class="ks-wol__grid" aria-live="polite"></div>
  </div>

  <style>
  .ks-wol{
    --navy:#14263D; --red:#D80000; --blue:#0056AC; --muted:#5d6b7a; --line:#eae6dc; --soft:#E7F0FB;
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    background:#F8F7F2; font-family:var(--fh); padding:clamp(54px,8vw,96px) 22px;
  }
  .ks-wol__inner{ max-width:1140px; margin:0 auto; }
  .ks-wol__head{ text-align:center; margin-bottom:40px; }
  .ks-kicker{ display:inline-flex; align-items:center; gap:9px; font-family:var(--fl); font-weight:600;
    font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }
  .ks-kicker svg{ width:18px; height:18px; fill:var(--red); }
  .ks-wol__title{ font-family:var(--fh); font-weight:600; color:var(--navy);
    font-size:clamp(2rem,4.4vw,3.1rem); margin:12px 0 0; letter-spacing:-.01em; }
  .ks-wol__rating{ font-family:var(--fl); font-weight:300; font-size:1rem; color:var(--muted); margin:14px 0 0; }
  .ks-wol__rating strong{ color:var(--navy); font-weight:700; }
  .ks-wol__stars{ color:#F5B301; letter-spacing:2px; }

  /* Wall of love: kolom masonry (cards mengalir, tidak terpotong) */
  .ks-wol__grid{ columns:3; column-gap:18px; }
  .ks-tm{ break-inside:avoid; -webkit-column-break-inside:avoid; margin:0 0 18px;
    background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px 22px 20px;
    box-shadow:0 12px 30px -22px rgba(20,38,61,.45); }
  .ks-tm__top{ display:grid; grid-template-columns:auto 1fr; align-items:center; gap:12px; }
  .ks-tm__av{ position:relative; width:44px; height:44px; border-radius:50%; overflow:hidden; flex:none;
    display:grid; place-items:center; background:var(--blue); color:#fff;
    font-family:var(--fl); font-weight:700; font-size:15px; }
  .ks-tm__av img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .ks-tm__name{ font-family:var(--fl); font-weight:600; font-size:.98rem; color:var(--navy); margin:0; line-height:1.2; }
  .ks-tm__role{ font-family:var(--fl); font-weight:300; font-size:12.5px; color:var(--muted); }
  .ks-tm__stars{ color:#F5B301; font-size:13px; letter-spacing:1px; margin-top:12px; }
  .ks-tm__quote{ font-family:var(--fh); font-size:1.06rem; line-height:1.55; color:#33414f; margin:8px 0 0; }

  @media (max-width:900px){ .ks-wol__grid{ columns:2; } }
  @media (max-width:560px){ .ks-wol__grid{ columns:1; } }
  </style>

  <script>
  (function () {
    var grid = document.querySelector('#review .ks-wol__grid');
    var data = window.KS_TESTIMONIALS || [];
    if (!grid) return;
    if (!data.length) {
      grid.innerHTML = '<p style="text-align:center;color:#888;font-family:Alexandria,sans-serif">' +
        'Data ulasan belum dimuat. Pasang <code>data/testimonials.js</code> sebelum section ini.</p>';
      return;
    }
    function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
    function initials(name){ return name.split(/\s+/).slice(0,2).map(function(w){return w.charAt(0);}).join('').toUpperCase(); }

    grid.innerHTML = data.map(function (t) {
      var ph = t.avatarPlaceholder ? ' data-placeholder="true"' : '';
      var img = t.avatar
        ? '<img src="' + esc(t.avatar) + '" alt="' + esc(t.name) + '" loading="lazy"' + ph + ' onerror="this.remove()">'
        : '';
      return '<figure class="ks-tm">' +
          '<div class="ks-tm__top">' +
            '<div class="ks-tm__av" aria-hidden="true">' + esc(initials(t.name)) + img + '</div>' +
            '<figcaption><p class="ks-tm__name">' + esc(t.name) + '</p>' +
              '<span class="ks-tm__role">' + esc(t.role || '') + '</span></figcaption>' +
          '</div>' +
          '<div class="ks-tm__stars" aria-label="5 dari 5">★★★★★</div>' +
          '<blockquote class="ks-tm__quote">' + esc(t.quote) + '</blockquote>' +
        '</figure>';
    }).join('');
  })();
  </script>
</section>
