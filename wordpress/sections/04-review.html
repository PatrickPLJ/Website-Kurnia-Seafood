<!-- ============================================================
     KURNIA SEAFOOD · SECTION CUSTOMER REVIEW  (kartu gelap)
     Pengganti "Our Mission" pada template Bamzi.
     Ganti kutipan, nama pelanggan, dan foto.
     ============================================================ -->
<section class="ks-rev" id="review">
  <div class="ks-rev__card">
    <svg class="ks-rev__watermark" viewBox="0 0 240 130" aria-hidden="true">
      <path d="M22 65 C55 25 130 25 168 58 L206 32 C198 50 198 80 206 98 L168 72 C130 105 55 105 22 65 Z"/>
      <circle cx="50" cy="56" r="3.5"/>
    </svg>

    <div class="ks-rev__body">
      <span class="ks-kicker">
        <svg viewBox="0 0 24 24"><path d="M12 17.3 6.2 21l1.6-6.6L3 9.8l6.7-.5L12 3l2.3 6.3 6.7.5-4.8 4.6L17.8 21z"/></svg>
        Kata Pelanggan
      </span>

      <div class="ks-rev__stars" aria-label="Rating 5 dari 5">★★★★★</div>

      <blockquote class="ks-rev__quote">
        “Seafoodnya benar-benar segar dan bumbunya juara. Tempatnya nyaman buat
        keluarga, pelayanannya ramah. Sudah jadi langganan tiap akhir pekan!”
      </blockquote>

      <div class="ks-rev__by">
        <span class="ks-rev__label">Pelanggan Setia</span>
        <p class="ks-rev__name">Rina Anggraini</p>
      </div>

      <div class="ks-rev__meta">
        <span><strong>4.9</strong>/5 rata-rata</span>
        <span class="ks-dot"></span>
        <span><strong>1.200+</strong> ulasan</span>
        <span class="ks-dot"></span>
        <span>Google &amp; GoFood</span>
      </div>
    </div>

    <figure class="ks-rev__media">
      <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=72"
           alt="Pelanggan menikmati hidangan di Kurnia Seafood" loading="lazy" onerror="this.style.display='none'">
    </figure>
  </div>

  <style>
  .ks-rev{
    --navy:#04223F; --navy-2:#06304F; --cream:#F6F1E7; --red:#D80000; --blue:#2E7BD1;
    --muted:rgba(246,241,231,.66);
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    background:#fff; font-family:var(--fh); padding:clamp(30px,5vw,64px) 22px;
  }
  .ks-rev__card{ position:relative; overflow:hidden; max-width:1140px; margin:0 auto;
    background:radial-gradient(120% 130% at 85% 0%, var(--navy-2), var(--navy) 62%);
    color:var(--cream); border-radius:28px; padding:clamp(34px,5vw,64px);
    display:grid; grid-template-columns:1.15fr .85fr; gap:clamp(28px,4vw,56px); align-items:center;
    box-shadow:0 40px 80px -40px rgba(4,34,63,.7); }
  .ks-rev__watermark{ position:absolute; right:-30px; top:-20px; width:360px; opacity:.06; z-index:0;
    fill:none; stroke:var(--cream); stroke-width:1.4; }
  .ks-rev__body{ position:relative; z-index:1; }
  .ks-kicker{ display:inline-flex; align-items:center; gap:9px; font-family:var(--fl); font-weight:600;
    font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:#FF6B6B; }
  .ks-kicker svg{ width:18px; height:18px; fill:#FF6B6B; }
  .ks-rev__stars{ color:#F5B301; font-size:1.25rem; letter-spacing:3px; margin:18px 0 14px; }
  .ks-rev__quote{ font-family:var(--fh); font-weight:400; color:var(--cream); margin:0;
    font-size:clamp(1.5rem,3.2vw,2.5rem); line-height:1.28; letter-spacing:-.01em; }
  .ks-rev__by{ margin-top:26px; }
  .ks-rev__label{ font-family:var(--fl); font-weight:500; font-size:11.5px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--muted); }
  .ks-rev__name{ font-family:var(--fh); font-weight:600; font-size:1.3rem; color:var(--cream); margin:4px 0 0; }
  .ks-rev__meta{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-top:24px;
    font-family:var(--fl); font-weight:300; font-size:13.5px; color:var(--muted); }
  .ks-rev__meta strong{ color:var(--cream); font-weight:600; }
  .ks-dot{ width:4px; height:4px; border-radius:50%; background:var(--muted); }

  .ks-rev__media{ position:relative; z-index:1; margin:0; aspect-ratio:4/5; border-radius:20px; overflow:hidden;
    background:linear-gradient(135deg,#06304F,#0a3c63); box-shadow:0 24px 50px -24px rgba(0,0,0,.55); }
  .ks-rev__media img{ width:100%; height:100%; object-fit:cover; }

  @media (max-width:820px){
    .ks-rev__card{ grid-template-columns:1fr; }
    .ks-rev__media{ order:-1; aspect-ratio:16/10; max-height:320px; }
  }
  </style>
</section>
