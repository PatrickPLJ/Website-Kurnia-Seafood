<!-- ============================================================
     KURNIA SEAFOOD · SECTION HERO  (gaya Bamzi · premium gelap)
     Tempel di Elementor: widget "HTML". Set padding section = 0.
     • Navbar di dalam blok ini OPSIONAL — kalau tema WordPress kamu
       sudah punya header, hapus bagian <nav class="ks-nav">…</nav>.
     • Logo: ganti teks "Kurnia Seafood" dengan widget/gambar logomu.
     ============================================================ -->
<section class="ks-hero">
  <span class="ks-hero__leaf ks-hero__leaf--l" aria-hidden="true"></span>
  <span class="ks-hero__leaf ks-hero__leaf--r" aria-hidden="true"></span>

  <!-- NAV (opsional) -->
  <nav class="ks-nav">
    <!-- LOGO full-color (apa adanya) tanpa kotak. WebP + retina @2x, PNG fallback. -->
    <a class="ks-nav__brand" href="#" aria-label="Kurnia Seafood">
      <span class="ks-logo-wrap">
        <picture>
          <source type="image/webp"
                  srcset="assets/kurnia-seafood-logo.webp 1x, assets/kurnia-seafood-logo@2x.webp 2x">
          <img class="ks-logo" src="assets/kurnia-seafood-logo.png" alt="Kurnia Seafood" width="170" height="92">
        </picture>
      </span>
    </a>
    <ul class="ks-nav__menu">
      <li><a href="#">Beranda</a></li>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#review">Ulasan</a></li>
      <li><a href="#kontak">Kontak</a></li>
    </ul>
    <a href="#reservasi" class="ks-btn ks-btn--red ks-nav__cta">Pesan Meja</a>
  </nav>

  <div class="ks-hero__inner">
    <h1 class="ks-hero__title">
      Santapan laut <span class="amp">&amp;</span><br>
      pengalaman makan tak terlupakan
    </h1>
    <p class="ks-hero__sub">Menyajikan kesegaran laut, kehangatan, &amp; kebahagiaan sejak 1998</p>
    <a href="#reservasi" class="ks-btn ks-btn--red ks-hero__cta">Pesan Meja</a>

    <div class="ks-hero__photo">
      <img src="https://images.unsplash.com/photo-1559737558-2f5a35f4523b?auto=format&fit=crop&w=1200&q=72"
           alt="Sajian seafood Kurnia Seafood di atas piring gelap" loading="lazy"
           onerror="this.style.display='none'">
    </div>
  </div>

  <style>
  .ks-hero{
    /* Variasi warna #2 — navy lebih dalam & lebih biru agar menyatu dgn logo */
    --navy:#03182F; --navy-2:#0A3A66; --cream:#F6F1E7; --red:#D80000; --red-2:#B40000;
    --blue:#0056AC; --muted:rgba(246,241,231,.62);
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    position:relative; overflow:hidden; isolation:isolate;
    background:radial-gradient(130% 95% at 50% -8%, var(--navy-2), var(--navy) 62%);
    color:var(--cream); font-family:var(--fh); padding:18px 18px 0;
  }
  /* glow + daun dekoratif */
  .ks-hero::before{ content:""; position:absolute; inset:0; z-index:-1; opacity:.6;
    background:radial-gradient(560px 340px at 50% 6%, rgba(0,86,172,.30), transparent 70%); }
  /* logo */
  /* logo full-color, tanpa kotak */
  .ks-logo-wrap{ display:inline-flex; align-items:center; }
  .ks-logo{ display:block; height:66px; width:auto; }
  .ks-hero__leaf{ position:absolute; top:64px; width:230px; height:300px; z-index:0; opacity:.16; pointer-events:none;
    background:radial-gradient(closest-side, var(--blue), transparent 70%); filter:blur(2px); }
  .ks-hero__leaf--l{ left:-60px; } .ks-hero__leaf--r{ right:-60px; transform:scaleX(-1); }

  /* NAV */
  .ks-nav{ position:relative; z-index:3; max-width:1180px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:18px; padding:14px 8px 6px; }
  .ks-nav__brand{ font-family:var(--fh); font-weight:600; font-size:1.5rem; color:var(--cream);
    text-decoration:none; letter-spacing:.01em; }
  .ks-nav__menu{ display:flex; gap:6px; list-style:none; margin:0; padding:6px;
    background:rgba(246,241,231,.08); border:1px solid rgba(246,241,231,.14); border-radius:999px; }
  .ks-nav__menu a{ font-family:var(--fl); font-weight:500; font-size:13.5px; letter-spacing:.04em;
    color:var(--cream); text-decoration:none; padding:9px 18px; border-radius:999px; transition:background .2s,color .2s; }
  .ks-nav__menu a:hover{ background:var(--cream); color:var(--navy); }

  /* HERO INNER */
  .ks-hero__inner{ position:relative; z-index:2; max-width:1000px; margin:0 auto; text-align:center;
    padding:clamp(36px,7vw,84px) 8px 0; }
  .ks-hero__title{ font-family:var(--fh); font-weight:500; color:var(--cream);
    font-size:clamp(2.3rem,6vw,4.7rem); line-height:1.04; letter-spacing:-.01em; margin:0; }
  .ks-hero__title .amp{ font-style:italic; font-weight:400; }
  .ks-hero__sub{ font-family:var(--fl); font-weight:300; color:var(--muted);
    font-size:clamp(.95rem,1.6vw,1.15rem); letter-spacing:.02em; margin:22px 0 0; }
  .ks-hero__cta{ margin-top:30px; }

  /* tombol */
  .ks-btn{ font-family:var(--fl); font-weight:600; font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px; padding:15px 30px; border-radius:10px;
    border:2px solid transparent; transition:transform .18s, box-shadow .25s, background .2s, color .2s; }
  .ks-btn--red{ background:var(--red); color:#fff; box-shadow:0 16px 30px -14px rgba(216,0,0,.6); }
  .ks-btn--red:hover{ background:var(--red-2); transform:translateY(-2px); }

  /* FOTO HERO */
  .ks-hero__photo{ position:relative; max-width:760px; margin:clamp(34px,6vw,68px) auto -1px;
    aspect-ratio:16/10; border-radius:26px 26px 0 0; overflow:hidden;
    background:linear-gradient(135deg,#06304F,#0a3c63);
    box-shadow:0 -10px 60px -20px rgba(0,0,0,.6); }
  .ks-hero__photo img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  @media (max-width:760px){
    .ks-nav__menu{ display:none; } .ks-nav__cta{ padding:11px 18px; }
  }
  @media (prefers-reduced-motion: reduce){ .ks-btn:hover{ transform:none; } }
  </style>
</section>
