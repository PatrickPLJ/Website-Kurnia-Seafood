    <div class="ks-hero__slide" data-placeholder="true" style="background-image:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=70')"></div>

  <style>
  .ks-hero{
    --navy:#03182F; --cream:#F6F1E7; --red:#D80000; --red-2:#B40000; --blue:#0056AC;
    --muted:rgba(246,241,231,.78);
    --fh:'Crimson Pro',Georgia,serif; --fl:'Alexandria',system-ui,sans-serif;
    position:relative; isolation:isolate; overflow:hidden; min-height:clamp(560px,92vh,880px);
    display:flex; flex-direction:column; font-family:var(--fh); color:var(--cream);
    background:var(--navy);
  }
  .ks-hero__bg{ position:absolute; inset:0; z-index:-2; }
  .ks-hero__slide{ position:absolute; inset:0; background-size:cover; background-position:center;
    opacity:0; transition:opacity 1.2s ease; }
  .ks-hero__slide.is-active{ opacity:1; }
  /* scrim agar teks terbaca di atas foto apa pun */
  .ks-hero__scrim{ position:absolute; inset:0; z-index:-1;
    background:linear-gradient(180deg, rgba(3,24,47,.82) 0%, rgba(3,24,47,.45) 40%, rgba(3,24,47,.72) 100%); }

  /* NAV */
  .ks-nav{ position:relative; z-index:2; max-width:1180px; width:100%; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:18px; padding:18px 22px 6px; }
  .ks-nav__brand{ display:inline-flex; }
  .ks-logo-wrap{ display:inline-flex; align-items:center; }
  .ks-logo{ display:block; height:62px; width:auto; }
  .ks-nav__menu{ display:flex; gap:6px; list-style:none; margin:0; padding:6px;
    background:rgba(246,241,231,.10); border:1px solid rgba(246,241,231,.18); border-radius:999px; backdrop-filter:blur(6px); }
  .ks-nav__menu a{ font-family:var(--fl); font-weight:500; font-size:13.5px; letter-spacing:.04em;
    color:var(--cream); text-decoration:none; padding:9px 18px; border-radius:999px; transition:background .2s,color .2s; }
  .ks-nav__menu a:hover{ background:var(--cream); color:var(--navy); }

  /* CONTENT */
  .ks-hero__content{ position:relative; z-index:2; flex:1; display:flex; flex-direction:column; justify-content:center;
    align-items:center; text-align:center; max-width:880px; margin:0 auto; padding:40px 22px 80px; }
  .ks-hero__kicker{ font-family:var(--fl); font-weight:600; font-size:13px; letter-spacing:.26em; text-transform:uppercase; color:#FFD7D7; }
  .ks-hero__title{ font-family:var(--fh); font-weight:500; font-size:clamp(2.4rem,6.5vw,5rem); line-height:1.04; letter-spacing:-.02em; margin:18px 0 0; text-shadow:0 2px 30px rgba(0,0,0,.35); }
  .ks-hero__sub{ font-family:var(--fl); font-weight:300; font-size:clamp(1rem,1.8vw,1.2rem); line-height:1.6; color:var(--muted); margin:20px 0 0; max-width:46ch; }
  .ks-hero__cta{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-top:32px; }

  .ks-btn{ font-family:var(--fl); font-weight:600; font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border-radius:10px;
    border:2px solid transparent; transition:transform .18s, box-shadow .25s, background .2s, color .2s; }
  .ks-btn--lg{ padding:16px 32px; font-size:14px; }
  .ks-btn--red{ background:var(--red); color:#fff; box-shadow:0 16px 30px -14px rgba(216,0,0,.6); }
  .ks-btn--red:hover{ background:var(--red-2); transform:translateY(-2px); }
  .ks-btn--glass{ background:rgba(246,241,231,.12); color:#fff; border-color:rgba(246,241,231,.4); backdrop-filter:blur(6px); }
  .ks-btn--glass:hover{ background:#fff; color:var(--navy); transform:translateY(-2px); }
  .ks-nav__cta{ padding:11px 22px; }

  /* dots */
  .ks-hero__dots{ position:absolute; z-index:2; left:0; right:0; bottom:24px; display:flex; gap:9px; justify-content:center; }
  .ks-hero__dots button{ width:9px; height:9px; border-radius:50%; border:0; cursor:pointer; padding:0;
    background:rgba(246,241,231,.4); transition:background .2s, transform .2s; }
  .ks-hero__dots button.is-active{ background:var(--red); transform:scale(1.25); }

  @media (max-width:760px){ .ks-nav__menu{ display:none; } .ks-logo{ height:50px; } }
  @media (prefers-reduced-motion: reduce){ .ks-hero__slide{ transition:none; } .ks-btn:hover{ transform:none; } }
  </style>

  <script>
  (function () {
    var root   = document.getElementById('hero');
    var slides = root.querySelectorAll('.ks-hero__slide');
    var dotsWrap = root.querySelector('.ks-hero__dots');
    if (slides.length < 2) return;

    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var i = 0, timer = null, DELAY = 5000;

    // dots
    slides.forEach(function (_, idx) {
      var b = document.createElement('button');
      b.type = 'button'; b.setAttribute('aria-label', 'Foto ' + (idx + 1));
      if (idx === 0) b.classList.add('is-active');
      b.addEventListener('click', function () { go(idx); restart(); });
      dotsWrap.appendChild(b);
    });
    var dots = dotsWrap.children;

    function go(n) {
      slides[i].classList.remove('is-active'); dots[i].classList.remove('is-active');
      i = (n + slides.length) % slides.length;
      slides[i].classList.add('is-active'); dots[i].classList.add('is-active');
    }
    function next() { go(i + 1); }
    function start() { if (!reduce) timer = setInterval(next, DELAY); }
    function stop() { if (timer) { clearInterval(timer); timer = null; } }
    function restart() { stop(); start(); }

    root.addEventListener('mouseenter', stop);
    root.addEventListener('mouseleave', start);
    document.addEventListener('visibilitychange', function () { document.hidden ? stop() : start(); });

    start();
  })();
  </script>
</section>
